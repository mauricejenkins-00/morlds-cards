<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Morlds – Pisces World</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="space-bg">
    <div class="space-layer space-layer--near"></div>
    <div class="space-layer space-layer--far"></div>
  </div>

  <div class="app-shell">
    <div class="top-bar">
      <div>
        <div class="title">Morlds</div>
        <div class="subtitle">Digital worlds</div>
      </div>
      <div id="morldUri">void://pisces</div>
    </div>

    <main class="content">
      <section class="world-container">
        <div class="figure-card">
          <div class="figure-card-inner">
            <button type="button" class="back-to-main-btn" id="backToMainBtn" aria-label="Back to main screen">
              ← Back
            </button>
            <div class="card-nft-badge">NFT</div>
            <div class="world-figure world-figure--pisces">
              <div class="world-orbit-wrapper">
                <div class="world-orbit" id="worldOrbit">
                  <div class="world-core pisces-container" id="worldCore">
                    <div class="pisces-ring"></div>
                    <div class="pisces-connector"></div>
                    <div class="fish fish-1">
                      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                          <linearGradient id="fishGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#5aa8e8;stop-opacity:0.5" />
                            <stop offset="50%" style="stop-color:#99ddff;stop-opacity:0.95" />
                            <stop offset="100%" style="stop-color:#5aa8e8;stop-opacity:0.5" />
                          </linearGradient>
                        </defs>
                        <path d="M 20 35 C 45 10, 80 10, 90 50 C 82 55, 50 40, 20 35 Z
                                 M 88 48 L 95 50 L 88 52 Z"
                              fill="url(#fishGrad1)"
                              stroke="rgba(120, 200, 255, 0.95)"
                              stroke-width="1.5"
                              stroke-linejoin="round"/>
                      </svg>
                    </div>
                    <div class="fish fish-2">
                      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                          <linearGradient id="fishGrad2" x1="100%" y1="100%" x2="0%" y2="0%">
                            <stop offset="0%" style="stop-color:#5aa8e8;stop-opacity:0.5" />
                            <stop offset="50%" style="stop-color:#99ddff;stop-opacity:0.95" />
                            <stop offset="100%" style="stop-color:#5aa8e8;stop-opacity:0.5" />
                          </linearGradient>
                        </defs>
                        <path d="M 80 65 C 55 90, 20 90, 10 50 C 18 45, 50 60, 80 65 Z
                                 M 12 48 L 5 50 L 12 52 Z"
                              fill="url(#fishGrad2)"
                              stroke="rgba(120, 200, 255, 0.95)"
                              stroke-width="1.5"
                              stroke-linejoin="round"/>
                      </svg>
                    </div>
                  </div>
                  <div class="world-label" id="worldLabel">Morld: Pisces</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="card-actions">
          <button type="button" id="downloadCardBtn">Save PNG</button>
          <button type="button" id="nftModeBtn">Create NFT</button>
        </div>
        <div class="nft-mint-link" id="nftMintLink"></div>

        <div class="world-controls">
          <button id="zoomOutBtn">−</button>
          <span>Zoom</span>
          <button id="zoomInBtn">+</button>
        </div>
        <div class="hint">
          Drag to spin. Pinch / scroll or buttons to zoom.
        </div>
        <div class="layer-annotations">
          <div class="layer-annotation-row layer-annotation-row--pisces-1">
            <span class="layer-annotation-label">Upper fish</span>
            <span class="layer-annotation-desc">Swimming eastward</span>
          </div>
          <div class="layer-annotation-row layer-annotation-row--pisces-2">
            <span class="layer-annotation-label">Lower fish</span>
            <span class="layer-annotation-desc">Swimming westward</span>
          </div>
          <div class="layer-annotation-row layer-annotation-row--connector">
            <span class="layer-annotation-label">Bond</span>
            <span class="layer-annotation-desc">Eternal connection</span>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <span>Active Morld</span>
        </div>

        <div class="meta-grid">
          <div class="meta-label">ID</div>
          <div class="meta-value" id="metaId"></div>

          <div class="meta-label">Name</div>
          <div class="meta-value" id="metaName"></div>

          <div class="meta-label">Struct</div>
          <div class="meta-value" id="metaMood"></div>

          <div class="meta-label">Seed</div>
          <div class="meta-value" id="metaSeed"></div>

          <div class="meta-label">Element</div>
          <div class="meta-value" id="metaPlanet"></div>

          <div class="meta-label">Background</div>
          <div class="meta-value" id="metaBackground"></div>

          <div class="meta-label">Tags</div>
          <div class="meta-value" id="metaTags"></div>
        </div>

        <div class="tag-input-row">
          <input
            id="newTagInput"
            type="text"
            placeholder="Add tag (press +)"
            maxlength="18"
          />
          <button id="addTagBtn">+ Tag</button>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
  <script src="script.js"></script>
</body>
</html>

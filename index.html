<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morlds – Solar System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="noise-overlay"></div>
  <div class="stars"></div>

  <header class="solar-header">
    <span class="solar-logo">◇ Morlds</span>
    <span class="solar-tagline">Explore the system</span>
  </header>

  <main class="solar-main">
    <div class="solar-system" id="solar-system">
      <div class="solar-core" id="solar-core" aria-hidden="true"></div>
      <div class="orbit orbit-1" aria-hidden="true"></div>
      <div class="orbit orbit-2" aria-hidden="true"></div>
      <div class="morld-orbs" id="morld-orbs"></div>
    </div>
    <p class="solar-empty" id="solar-empty" hidden>No Morlds in this system.</p>
  </main>

  <aside class="details-panel" id="details-panel">
    <div class="details-panel-inner">
      <button type="button" class="details-close" id="details-close" aria-label="Close">×</button>
      <div class="details-content" id="details-content"></div>
    </div>
  </aside>

  <script src="app.js"></script>
</body>
</html>
